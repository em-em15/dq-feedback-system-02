<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dairy Queen Admin Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {font-family: Arial; background:#fff5f5; text-align:center; padding:20px;}
.container {max-width:1200px; margin:auto; background:white; padding:30px; border-radius:10px; box-shadow:0 0 15px rgba(0,0,0,0.1);}
h1 {color:#d71920;}
h2 {color:#0057a4;}
canvas {margin-top:30px;}
#recommendChart {max-width:300px; margin:20px auto;}
table {width:100%; border-collapse:collapse; margin-top:30px;}
th, td {border:1px solid #ccc; padding:8px; text-align:center;}
th {background:#d71920; color:white;}
tr:nth-child(even){background:#f9f9f9;}
td.comments {text-align:left; max-width:300px; word-wrap:break-word;}
.highlight {animation: highlightAnim 2s ease;}
@keyframes highlightAnim {0% {background-color: #ffff99;} 100% {background-color: transparent;}}
</style>
</head>
<body>
<div class="container">
<h1>Dairy Queen Customer Feedback Dashboard</h1>
<h2>All-Day Rating: <span id="allDayRating">⭐ 0 / 5</span></h2>
<h2>Total Feedback Submitted: <span id="totalFeedback">0</span></h2>

<canvas id="ratingChart"></canvas>
<canvas id="recommendChart"></canvas>

<h2>All Feedback Ratings</h2>
<table id="feedbackTable">
<thead>
<tr>
<th>Timestamp</th>
<th>Overall</th>
<th>Taste</th>
<th>Service</th>
<th>Cleanliness</th>
<th>Recommend</th>
<th>Average</th>
<th>Comments</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>
const SHEET_JSON_URL = "https://script.google.com/macros/s/AKfycbx_RmCNaG8ib2A_RA-cL3yn5UT4UIYMtOtF2wbqA2q736s3AeIcaRjG6S4Iy9fPwyaBKg/exec"; // Replace with your Apps Script Web App URL
let ratingChart = null;
let recommendChart = null;
let previousTimestamps = new Set();

// Safe parsing
function safeNumber(val){ const n = Number(val); return isNaN(n)?0:n; }
function safeValue(val){ return val===undefined||val===null?'':val; }

// Fetch and map data
async function fetchFeedback(){
  try{
    const res = await fetch(SHEET_JSON_URL);
    const raw = await res.json();
    // Map to fixed columns
    return raw.map(d=>({
      Timestamp: safeValue(d.Timestamp),
      Overall_RATING: safeNumber(d.Overall_RATING),
      Taste_RATING: safeNumber(d.Taste_RATING),
      Service_RATING: safeNumber(d.Service_RATING),
      Cleanliness_RATING: safeNumber(d.Cleanliness_RATING),
      Recommend: safeValue(d.Recommend),
      Comments: safeValue(d.Comments),
      Average_RATING: safeNumber(d.Average_RATING)
    }));
  }catch(err){
    console.error(err);
    return [];
  }
}

// Calculate all-day average
function calculateAllDayRating(data){
  let sum=0, count=0;
  data.forEach(d=>{
    if(d.Average_RATING>0){ sum += d.Average_RATING; count++; }
  });
  return count ? (sum/count).toFixed(2) : 0;
}

// Prepare charts
function prepareCharts(data){
  if(ratingChart) ratingChart.destroy();
  if(recommendChart) recommendChart.destroy();

  // Bar chart: Overall Ratings
  const ratingCounts = [0,0,0,0,0];
  data.forEach(d=>{
    const r = Math.round(d.Overall_RATING);
    if(r>=1&&r<=5) ratingCounts[r-1]++;
  });
  const ratingCtx = document.getElementById('ratingChart').getContext('2d');
  ratingChart = new Chart(ratingCtx,{
    type:'bar',
    data:{labels:['1 Star','2 Stars','3 Stars','4 Stars','5 Stars'], datasets:[{label:'Ratings', data:ratingCounts, backgroundColor:'#d71920'}]},
    options:{responsive:true, plugins:{legend:{display:false}}}
  });

  // Pie chart: Recommend
  let yes=0, no=0;
  data.forEach(d=>{ if(d.Recommend==='Yes') yes++; else no++; });
  const recommendCtx = document.getElementById('recommendChart').getContext('2d');
  recommendChart = new Chart(recommendCtx,{
    type:'pie',
    data:{labels:['Recommend','Not Recommend'], datasets:[{data:[yes,no], backgroundColor:['#d71920','#0057a4']}]},
    options:{responsive:true, plugins:{legend:{position:'bottom'}}}
  });
}

// Populate table
function populateTable(data){
  const tbody = document.querySelector('#feedbackTable tbody');
  tbody.innerHTML='';
  const newTimestamps = new Set();

  data.forEach(d=>{
    const tr = document.createElement('tr');
    const isNew = !previousTimestamps.has(d.Timestamp);
    if(isNew) tr.classList.add('highlight');

    tr.innerHTML = `
      <td>${d.Timestamp}</td>
      <td>${d.Overall_RATING}</td>
      <td>${d.Taste_RATING}</td>
      <td>${d.Service_RATING}</td>
      <td>${d.Cleanliness_RATING}</td>
      <td>${d.Recommend}</td>
      <td>${d.Average_RATING.toFixed(2)}</td>
      <td class="comments">${d.Comments}</td>
    `;
    tbody.appendChild(tr);
    newTimestamps.add(d.Timestamp);
  });

  previousTimestamps = newTimestamps;
}

// Update dashboard only if new submission exists
async function updateDashboardIfNew(){
  const data = await fetchFeedback();
  const newDataExists = data.some(d=>!previousTimestamps.has(d.Timestamp));
  if(newDataExists){
    document.getElementById('totalFeedback').textContent = data.length;
    document.getElementById('allDayRating').textContent = "⭐ "+calculateAllDayRating(data)+" / 5";
    prepareCharts(data);
    populateTable(data);
  }
}

// Initial load
updateDashboardIfNew();

// Poll every 10s for new submissions
setInterval(updateDashboardIfNew, 10000);
</script>
</body>
</html>
