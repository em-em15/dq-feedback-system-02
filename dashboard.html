<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dairy Queen Customer Feedback Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f6f6f6;
margin:0;
padding:20px;
text-align:center;
}

h1{
color:#d71920;
}

.dashboard{
max-width:1100px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.metrics{
display:flex;
justify-content:space-around;
margin-bottom:20px;
}

.card{
background:#0057a4;
color:white;
padding:15px;
border-radius:8px;
width:180px;
}

.charts{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
margin-top:10px;
}

canvas{
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:8px;
border:1px solid #ddd;
font-size:13px;
}

th{
background:#d71920;
color:white;
}

.highlight{
background:#fff3a6;
animation:fade 2s forwards;
}

@keyframes fade{
from{background:#fff3a6;}
to{background:white;}
}

.comments{
text-align:left;
}

</style>
</head>

<body>

<div class="dashboard">

<h1>Dairy Queen Feedback Dashboard</h1>

<div class="metrics">

<div class="card">
<h3>All Day Rating</h3>
<span id="avgRating">0</span> ⭐
</div>

<div class="card">
<h3>Total Feedback</h3>
<span id="totalFeedback">0</span>
</div>

</div>

<div class="charts">

<canvas id="overallChart" width="350" height="180"></canvas>
<canvas id="recommendChart" width="220" height="180"></canvas>

</div>

<div class="charts">

<canvas id="tasteChart" width="150" height="120"></canvas>
<canvas id="serviceChart" width="150" height="120"></canvas>
<canvas id="cleanChart" width="150" height="120"></canvas>

</div>

<table id="feedbackTable">

<thead>
<tr>
<th>Timestamp</th>
<th>Overall</th>
<th>Taste</th>
<th>Service</th>
<th>Cleanliness</th>
<th>Recommend</th>
<th>Average</th>
<th>Comments</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxAOi2VgIGGv-gK_RFvWVHB5Y4tANirt82oqMUVUFS2WsOcju19l0fNILp5f2oNbyQgGQ/exec";

let previousIDs = new Set();

async function fetchData(){

const res = await fetch(API_URL);
const data = await res.json();

return data.map(r=>({

Timestamp:r.Timestamp || "",

Overall:Number(r.Overall_RATING)||0,

Taste:Number(r.Taste_RATING)||0,

Service:Number(r.Service_RATING)||0,

Clean:Number(r.Cleanliness_RATING)||0,

Recommend:r.Recommend||"",

Comments:r.Comments||"",

Average:Number(r.Average_RATING)||0

}));

}

function buildFrequency(list){

let freq=[0,0,0,0,0];

list.forEach(v=>{
if(v>=1 && v<=5) freq[v-1]++;
});

return freq;

}

function renderCharts(data){

const overallFreq = buildFrequency(data.map(d=>d.Overall));
const tasteFreq = buildFrequency(data.map(d=>d.Taste));
const serviceFreq = buildFrequency(data.map(d=>d.Service));
const cleanFreq = buildFrequency(data.map(d=>d.Clean));

let yes=0,no=0;

data.forEach(d=>{
if(d.Recommend=="Yes") yes++;
if(d.Recommend=="No") no++;
});

new Chart(document.getElementById("overallChart"),{

type:"bar",

data:{
labels:[1,2,3,4,5],
datasets:[{
label:"Overall Ratings",
data:overallFreq,
backgroundColor:"#d71920"
}]
},

options:{responsive:false}

});

new Chart(document.getElementById("recommendChart"),{

type:"pie",

data:{
labels:["Yes","No"],
datasets:[{
data:[yes,no],
backgroundColor:["#0057a4","#d71920"]
}]
},

options:{responsive:false}

});

new Chart(document.getElementById("tasteChart"),{

type:"bar",

data:{
labels:[1,2,3,4,5],
datasets:[{data:tasteFreq,backgroundColor:"#f4a261"}]
},

options:{plugins:{legend:{display:false}},responsive:false}

});

new Chart(document.getElementById("serviceChart"),{

type:"bar",

data:{
labels:[1,2,3,4,5],
datasets:[{data:serviceFreq,backgroundColor:"#2a9d8f"}]
},

options:{plugins:{legend:{display:false}},responsive:false}

});

new Chart(document.getElementById("cleanChart"),{

type:"bar",

data:{
labels:[1,2,3,4,5],
datasets:[{data:cleanFreq,backgroundColor:"#e9c46a"}]
},

options:{plugins:{legend:{display:false}},responsive:false}

});

}

function populateTable(data){

const tbody=document.querySelector("#feedbackTable tbody");

tbody.innerHTML="";

data.sort((a,b)=>new Date(b.Timestamp)-new Date(a.Timestamp));

let newIDs=new Set();

data.forEach(row=>{

const tr=document.createElement("tr");

if(!previousIDs.has(row.Timestamp)){
tr.classList.add("highlight");
}

tr.innerHTML=`
<td>${row.Timestamp}</td>
<td>${row.Overall}</td>
<td>${row.Taste}</td>
<td>${row.Service}</td>
<td>${row.Clean}</td>
<td>${row.Recommend}</td>
<td>${row.Average.toFixed(2)}</td>
<td class="comments">${row.Comments}</td>
`;

tbody.appendChild(tr);

newIDs.add(row.Timestamp);

});

previousIDs=newIDs;

}

function computeAverage(data){

let valid=data.filter(d=>d.Average>0);

let avg=valid.reduce((sum,d)=>sum+d.Average,0)/valid.length;

return avg.toFixed(2);

}

async function updateDashboard(){

const data=await fetchData();

document.getElementById("totalFeedback").innerText=data.length;

document.getElementById("avgRating").innerText=computeAverage(data);

renderCharts(data);

populateTable(data);

}

updateDashboard();

setInterval(updateDashboard,10000);

</script>

</body>
</html>
