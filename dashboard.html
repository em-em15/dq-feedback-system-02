<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dairy Queen Admin Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {font-family:Arial;background:#fff5f5;text-align:center;padding:20px;}
.container {max-width:1000px;margin:auto;background:white;padding:30px;border-radius:10px;box-shadow:0 0 15px rgba(0,0,0,0.1);}
h1 {color:#d71920;}
h2 {color:#0057a4;}
canvas {margin-top:30px;}
#recommendChart {max-width:300px;margin:20px auto;}
table {width:100%;border-collapse:collapse;margin-top:30px;}
th, td {border:1px solid #ccc;padding:8px;text-align:center;}
th {background:#d71920;color:white;}
tr:nth-child(even){background:#f9f9f9;}
td.comments {text-align:left; max-width:300px; word-wrap:break-word;}
.highlight {animation: highlightAnim 2s ease;}
@keyframes highlightAnim {
  0% {background-color: #ffff99;}
  100% {background-color: transparent;}
}
</style>
</head>
<body>
<div class="container">
<h1>Dairy Queen Customer Feedback Dashboard</h1>
<h2>All-Day Rating: <span id="allDayRating">⭐ 0 / 5</span></h2>
<h2>Total Feedback Submitted: <span id="totalFeedback">0</span></h2>

<canvas id="ratingChart"></canvas>
<canvas id="recommendChart"></canvas>

<h2>All Feedback Ratings</h2>
<table id="feedbackTable">
<thead>
<tr id="tableHeader">
<!-- Will dynamically generate headers -->
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>
const SHEET_JSON_URL = "https://script.google.com/macros/s/AKfycbzm2E_uPG7ixZB9dDPjexBfGCOdnmeabiqC9zdQMxSmaxNu6g1U1fQxrsx8tLDYsUmscg/exec"; // Replace with your Apps Script URL
let ratingChart = null;
let recommendChart = null;
let previousTimestamps = new Set();

// Fetch data from Google Sheet
async function fetchFeedback(){
  try {
    const res = await fetch(SHEET_JSON_URL);
    const data = await res.json();
    return data.slice(4); // skip first 4 rows
  } catch (err) {
    console.error("Failed to fetch feedback:", err);
    return [];
  }
}

// Safely handle any value, including text
function safeValue(value){
  return (value === undefined || value === null) ? "" : value;
}

// Calculate average of numeric fields only if valid
function calculateAllDayRating(data){
  let sum = 0;
  let count = 0;
  data.forEach(d => {
    const val = Number(d.Average_Rating);
    if(!isNaN(val)){ sum += val; count++; }
  });
  return count ? (sum/count).toFixed(2) : 0;
}

// Prepare charts
function prepareCharts(data){
  if(ratingChart) ratingChart.destroy();
  if(recommendChart) recommendChart.destroy();

  // Overall Ratings Bar Chart
  const ratingCounts = [0,0,0,0,0];
  data.forEach(d => {
    const r = Math.round(Number(d.Overall_Rating));
    if(r >=1 && r <=5) ratingCounts[r-1]++;
  });
  const ratingCtx = document.getElementById('ratingChart').getContext('2d');
  ratingChart = new Chart(ratingCtx,{
    type:'bar',
    data:{labels:['1 Star','2 Stars','3 Stars','4 Stars','5 Stars'], datasets:[{label:'Ratings', data:ratingCounts, backgroundColor:'#d71920'}]},
    options:{responsive:true, plugins:{legend:{display:false}}}
  });

  // Recommend Pie Chart
  let yes=0, no=0;
  data.forEach(d => { if(d.Recommend==='Yes') yes++; else no++; });
  const recommendCtx = document.getElementById('recommendChart').getContext('2d');
  recommendChart = new Chart(recommendCtx,{
    type:'pie',
    data:{labels:['Recommend','Not Recommend'], datasets:[{data:[yes,no], backgroundColor:['#d71920','#0057a4']}]},
    options:{responsive:true, plugins:{legend:{position:'bottom'}}}
  });
}

// Dynamically generate table header from keys
function generateTableHeader(data){
  const theadRow = document.getElementById('tableHeader');
  theadRow.innerHTML = '';
  if(data.length === 0) return;
  Object.keys(data[0]).forEach(key => {
    const th = document.createElement('th');
    th.textContent = key.replace(/_/g,' ');
    theadRow.appendChild(th);
  });
}

// Populate table
function populateTable(data){
  const tbody = document.querySelector('#feedbackTable tbody');
  tbody.innerHTML='';
  const newTimestamps = new Set();

  data.forEach(d => {
    const tr = document.createElement('tr');
    const timestamp = d.Timestamp || '';
    const isNew = !previousTimestamps.has(timestamp);
    if(isNew) tr.classList.add('highlight');

    // Dynamically create td for all keys
    let tdHTML = '';
    Object.keys(d).forEach(key => {
      tdHTML += <td class="${key.toLowerCase()==='comments' ? 'comments' : ''}">${safeValue(d[key])}</td>;
    });
    tr.innerHTML = tdHTML;
    tbody.appendChild(tr);
    newTimestamps.add(timestamp);
  });

  previousTimestamps = newTimestamps;
}

// Update dashboard only if new submission exists
async function updateDashboardIfNew(){
  const data = await fetchFeedback();
  const newDataExists = data.some(d => !previousTimestamps.has(d.Timestamp));
  if(newDataExists){
    document.getElementById('totalFeedback').textContent = data.length;
    document.getElementById('allDayRating').textContent = "⭐ "+calculateAllDayRating(data)+" / 5";
    generateTableHeader(data);
    prepareCharts(data);
    populateTable(data);
  }
}

// Initial load
updateDashboardIfNew();

// Poll Google Sheet every 10 seconds to detect new submissions
setInterval(updateDashboardIfNew, 10000);
</script>
</body>
</html>
